<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pahrin — Modern Ethnic Women's Wear</title>
  <meta name="description" content="Pahrin — Contemporary ethnic women's clothing. Printed dresses, kurtas, and ready-made garments designed for modern everyday elegance." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    /* ──────────────────────────────────────────
       DESIGN TOKENS
    ────────────────────────────────────────── */
    :root {
      --ivory:      #F8F5F0;
      --ivory-deep: #EFE9E1;
      --sand:       #E8DED2;
      --charcoal:   #1C1C1E;
      --charcoal-2: #3A3A3C;
      --muted:      #8A8A8E;
      --sage:       #7B9E87;
      --sage-dark:  #5A7A64;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--ivory);
      color: var(--charcoal);
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* ──────────────────────────────────────────
       LAYOUT & COMPONENTS
    ────────────────────────────────────────── */
    header {
      background: rgba(248, 245, 240, 0.85);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--ivory-deep);
    }
    .nav-container {
      max-width: 1300px; margin: 0 auto;
      padding: 1.2rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .brand-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; font-weight: 500; letter-spacing: 1px;
    }
    .cart-trigger {
      position: relative; background: none; border: none; cursor: pointer;
      font-size: 1rem; font-weight: 500; color: var(--charcoal);
    }
    .cart-count {
      background: var(--charcoal); color: #fff;
      font-size: 0.7rem; padding: 2px 6px; border-radius: 10px;
      position: absolute; top: -8px; right: -12px;
    }

    main { max-width: 1300px; margin: 0 auto; padding: 2rem; }

    /* Controls bar */
    .controls-bar {
      display: flex; flex-wrap: wrap; justify-content: space-between;
      align-items: center; gap: 1rem; margin-bottom: 2rem;
    }
    .search-input {
      padding: 0.6rem 1rem; width: 280px; border: 1px solid var(--sand);
      background: #fff; border-radius: 4px; font-family: inherit;
    }
    .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-pill {
      padding: 0.5rem 1rem; border: 1px solid var(--sand); background: none;
      border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
    }
    .filter-pill.active { background: var(--charcoal); color: #fff; border-color: var(--charcoal); }
    .sort-select { padding: 0.6rem 1rem; border: 1px solid var(--sand); background: #fff; border-radius: 4px; }

    /* Product Grid */
    .products-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }
    .product-card {
      background: #fff; border-radius: 6px; overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: transform 0.3s ease;
      cursor: pointer; display: flex; flex-direction: column;
    }
    .product-card:hover { transform: translateY(-4px); }
    .product-img-frame { width: 100%; aspect-ratio: 3/4; background: var(--ivory-deep); overflow: hidden; }
    .product-img { width: 100%; height: 100%; object-fit: cover; }
    .product-info { padding: 1rem; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .product-title { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--charcoal-2); }
    .product-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
    .product-price-row { display: flex; align-items: center; gap: 0.5rem; }
    .sale-price { font-weight: 600; color: var(--charcoal); }
    .mrp-price { font-size: 0.85rem; text-decoration: line-through; color: var(--muted); }

    /* Drawer Base styles */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer-content {
      position: fixed; right: 0; top: 0; bottom: 0; width: 100%; max-width: 450px;
      background: #fff; padding: 2rem; display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.3s ease;
    }
    .drawer-overlay.open .drawer-content { transform: translateX(0); }

    /* Product Modal Window / Checkout General Overlays */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1001;
      display: none; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff; max-width: 800px; width: 100%; max-height: 90vh;
      overflow-y: auto; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr;
    }
    .checkout-box {
      background: #fff; max-width: 500px; width: 100%; padding: 2.5rem;
      border-radius: 8px; position: relative; display: flex; flex-direction: column; gap: 1.2rem;
    }
    @media (max-width: 768px) {
      .modal-box { grid-template-columns: 1fr; }
    }
    .modal-gallery { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .modal-main-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: var(--ivory-deep); }
    .modal-thumbs { display: flex; gap: 0.5rem; overflow-x: auto; }
    .modal-thumb { width: 60px; height: 80px; object-fit: cover; cursor: pointer; border: 2px solid transparent; }
    .modal-thumb.active { border-color: var(--charcoal); }
    .modal-details { padding: 2rem; display: flex; flex-direction: column; gap: 1rem; position: relative; }
    .close-btn { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
    
    /* Inputs Form Rules */
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label { font-size: 0.85rem; font-weight: 500; color: var(--charcoal-2); }
    .form-input { padding: 0.75rem; border: 1px solid var(--sand); border-radius: 4px; font-family: inherit; font-size: 0.95rem; }
    .form-input:focus { outline: none; border-color: var(--charcoal); }

    .btn-primary {
      background: var(--charcoal); color: #fff; border: none; padding: 0.8rem;
      border-radius: 4px; font-weight: 500; cursor: pointer; text-align: center; width: 100%;
    }
    .btn-primary:hover { background: var(--charcoal-2); }
    .btn-whatsapp { background-color: #25D366; color: #fff; }
    .btn-whatsapp:hover { background-color: #20BA5A; }

    #loadingMessage { text-align: center; padding: 3rem; font-size: 1.2rem; color: var(--muted); }
    
    /* Cart Styling */
    .cart-header { display: flex; justify-content: space-between; margin-bottom: 1.5rem; align-items: center; }
    .cart-items { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
    .cart-item { display: flex; gap: 1rem; align-items: center; border-bottom: 1px solid var(--ivory-deep); padding-bottom: 1rem; }
    .cart-item-img { width: 60px; height: 80px; object-fit: cover; }
    .cart-item-details { flex-grow: 1; }

    #scrollTopBtn {
      position: fixed; bottom: 2rem; right: 2rem; background: #fff; border: 1px solid var(--sand);
      width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center;
    }
    #scrollTopBtn.visible { display: flex; }
  </style>
</head>
<body>

<header>
  <div class="nav-container">
    <div class="brand-logo">Pahrin</div>
    <button class="cart-trigger" id="cartOpenBtn">
      Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<main>
  <div class="controls-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="Search products..." />
    
    <div class="filter-group">
      <button class="filter-pill active" data-category="all">All Items</button>
      <button class="filter-pill" data-category="Asymmetric">Asymmetric</button>
      <button class="filter-pill" data-category="Straight">Straight</button>
    </div>

    <select class="sort-select" id="sortSelect">
      <option value="default">Sort By</option>
      <option value="low-high">Price: Low to High</option>
      <option value="high-low">Price: High to Low</option>
    </select>
  </div>

  <div id="loadingMessage">Loading beautiful collection...</div>
  <div class="products-grid" id="productsGrid" style="display: none;"></div>
</main>

<div class="drawer-overlay" id="cartDrawer">
  <div class="drawer-content">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="close-btn" id="cartCloseBtn">&times;</button>
    </div>
    <div class="cart-items" id="cartItemsContainer"></div>
    <div class="drawer-content-footer" style="border-top:1px solid var(--sand); padding-top:1rem; margin-top:1rem;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; font-weight: 600;">
        <span>Total:</span>
        <span id="cartTotalValue">₹0</span>
      </div>
      <button class="btn-primary" id="checkoutTriggerBtn">Proceed to Checkout</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="productModal">
  <div class="modal-box" id="modalBox">
    </div>
</div>

<div class="modal-overlay" id="checkoutModal">
  <div class="checkout-box">
    <button class="close-btn" id="checkoutCloseBtn">&times;</button>
    <h2 style="font-family:'Playfair Display', serif; font-size:1.6rem; border-bottom:1px solid var(--ivory-deep); padding-bottom:0.5rem;">Delivery Details</h2>
    
    <form id="checkoutForm" onsubmit="handleOrderSubmit(event)">
      <div class="form-group" style="margin-bottom:1rem;">
        <label for="custName">Full Name</label>
        <input type="text" id="custName" class="form-input" placeholder="Your name" required />
      </div>
      
      <div class="form-group" style="margin-bottom:1rem;">
        <label for="custMobile">Mobile Number</label>
        <input type="tel" id="custMobile" class="form-input" placeholder="10-digit number" pattern="[0-9]{10}" title="Please enter a valid 10 digit mobile number" required />
      </div>
      
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label for="custAddress">Shipping Address</label>
        <textarea id="custAddress" class="form-input" rows="3" placeholder="Complete address with pincode" style="resize:none;" required></textarea>
      </div>

      <button type="submit" class="btn-primary btn-whatsapp">Place Order via WhatsApp</button>
    </form>
  </div>
</div>

<button id="scrollTopBtn">↑</button>

<script>
// ──────────────────────────────────────────
// GLOBAL STATE
// ──────────────────────────────────────────
let products = [];
let cart = [];
let activeCategory = 'all';
let sortMode = 'default';
let searchQuery = '';

// ──────────────────────────────────────────
// INITIALIZE & FETCH CSV
// ──────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  Papa.parse("product.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      products = results.data.map(row => {
        const id = row["Product ID"] ? row["Product ID"].trim() : "";
        
        const parsedImages = [];
        for (let i = 1; i <= 8; i++) {
          const imgFile = row[`Image ${i}`];
          if (imgFile && imgFile.trim() !== "") {
            parsedImages.push("images/" + imgFile.trim());
          }
        }

        const finalImages = parsedImages.length > 0 ? parsedImages : ["images/PROD001_1.jpg"];

        return {
          id: id,
          title: row["Title"] ? row["Title"].trim() : "",
          color: row["Color"] ? row["Color"].trim() : "",
          material: row["Material"] ? row["Material"].trim() : "",
          style: row["Style"] ? row["Style"].trim() : "Straight",
          neckStyle: row["Neck Style"] ? row["Neck Style"].trim() : "",
          mrp: parseFloat(row["MRP"]) || 0,
          price: parseFloat(row["Sale Price"]) || 0,
          images: finalImages
        };
      }).filter(p => p.id);

      document.getElementById("loadingMessage").style.display = "none";
      document.getElementById("productsGrid").style.display = "grid";
      renderProducts();
    },
    error: function(err) {
      console.error("Error loading CSV: ", err);
      document.getElementById("loadingMessage").innerText = "Failed to load product list. Please refresh.";
    }
  });
});

// ──────────────────────────────────────────
// CORE DOM RENDERING
// ──────────────────────────────────────────
function renderProducts() {
  const grid = document.getElementById("productsGrid");
  grid.innerHTML = "";

  let filtered = [...products];

  if (activeCategory !== "all") {
    filtered = filtered.filter(p => p.style.toLowerCase() === activeCategory.toLowerCase());
  }

  if (searchQuery) {
    filtered = filtered.filter(p => p.title.toLowerCase().includes(searchQuery.toLowerCase()) || p.color.toLowerCase().includes(searchQuery.toLowerCase()));
  }

  if (sortMode === "low-high") {
    filtered.sort((a, b) => a.price - b.price);
  } else if (sortMode === "high-low") {
    filtered.sort((a, b) => b.price - a.price);
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 3rem; color: var(--muted);">No matching products found.</div>`;
    return;
  }

  filtered.forEach(product => {
    const card = document.createElement("div");
    card.className = "product-card";
    card.addEventListener("click", () => openProductModal(product));

    card.innerHTML = `
      <div class="product-img-frame">
        <img class="product-img" src="${product.images[0]}" alt="${product.title}" loading="lazy">
      </div>
      <div class="product-info">
        <div>
          <h3 class="product-title">${product.title}</h3>
          <div class="product-meta">${product.color} • ${product.material}</div>
        </div>
        <div class="product-price-row">
          <span class="sale-price">₹${product.price}</span>
          <span class="mrp-price">₹${product.mrp}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ──────────────────────────────────────────
// MODAL OPERATION ACTIONS
// ──────────────────────────────────────────
function openProductModal(product) {
  const modalBox = document.getElementById("modalBox");
  const overlay = document.getElementById("productModal");

  modalBox.innerHTML = `
    <div class="modal-gallery">
      <img id="mainModalImg" class="modal-main-img" src="${product.images[0]}" alt="${product.title}">
      <div class="modal-thumbs">
        ${product.images.map((img, i) => `
          <img class="modal-thumb ${i === 0 ? 'active' : ''}" src="${img}" onclick="switchModalImage(this, '${img}')" alt="">
        `).join('')}
      </div>
    </div>
    <div class="modal-details">
      <button class="close-btn" onclick="closeProductModal()">&times;</button>
      <h2 style="font-family:'Playfair Display', serif; font-size:1.5rem; margin-top:1rem;">${product.title}</h2>
      <div class="product-price-row" style="font-size:1.3rem; margin: 0.5rem 0;">
        <span class="sale-price">₹${product.price}</span>
        <span class="mrp-price">₹${product.mrp}</span>
      </div>
      <hr style="border:0; border-top:1px solid var(--ivory-deep); margin:0.5rem 0;">
      <p style="font-size:0.9rem; color:var(--charcoal-2)"><strong>Style:</strong> ${product.style}</p>
      <p style="font-size:0.9rem; color:var(--charcoal-2)"><strong>Neckline:</strong> ${product.neckStyle}</p>
      <p style="font-size:0.9rem; color:var(--charcoal-2)"><strong>Fabric:</strong> ${product.material}</p>
      <p style="font-size:0.9rem; color:var(--charcoal-2)"><strong>Color:</strong> ${product.color}</p>
      <div style="flex-grow:1;"></div>
      <button class="btn-primary" id="addToCartBtn">Add to Cart</button>
    </div>
  `;

  document.getElementById("addToCartBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    addToCart(product);
  });

  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeProductModal() {
  document.getElementById("productModal").classList.remove("open");
  document.body.style.overflow = "";
}

function switchModalImage(thumb, imgSrc) {
  document.getElementById("mainModalImg").src = imgSrc;
  document.querySelectorAll(".modal-thumb").forEach(t => t.classList.remove("active"));
  thumb.classList.add("active");
}

// ──────────────────────────────────────────
// SHOPPING CART CONTROLS
// ──────────────────────────────────────────
function addToCart(product) {
  const existing = cart.find(item => item.id === product.id);
  if (existing) {
    existing.quantity += 1;
  } else {
    cart.push({ ...product, quantity: 1 });
  }
  updateCartUI();
  closeProductModal();
  document.getElementById("cartDrawer").classList.add("open");
}

function updateCartUI() {
  const container = document.getElementById("cartItemsContainer");
  const countSpan = document.getElementById("cartCount");
  const totalSpan = document.getElementById("cartTotalValue");

  container.innerHTML = "";
  let totalItems = 0;
  let totalPrice = 0;

  cart.forEach(item => {
    totalItems += item.quantity;
    totalPrice += (item.price * item.quantity);

    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <img class="cart-item-img" src="${item.images[0]}" alt="">
      <div class="cart-item-details">
        <h4 style="font-size:0.9rem; font-weight:500; margin-bottom:0.2rem;">${item.title}</h4>
        <div style="font-size:0.85rem; color:var(--muted);">₹${item.price} × ${item.quantity}</div>
      </div>
      <button style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.1rem;" onclick="removeFromCart('${item.id}')">&times;</button>
    `;
    container.appendChild(div);
  });

  countSpan.innerText = totalItems;
  totalSpan.innerText = `₹${totalPrice}`;
}

function removeFromCart(id) {
  cart = cart.filter(item => item.id !== id);
  updateCartUI();
}

// ──────────────────────────────────────────
// WHATSAPP ORDER GENERATION
// ──────────────────────────────────────────
function handleOrderSubmit(e) {
  e.preventDefault();
  
  const name = document.getElementById("custName").value.trim();
  const mobile = document.getElementById("custMobile").value.trim();
  const address = document.getElementById("custAddress").value.trim();

  let itemDetails = "";
  let orderTotal = 0;
  
  cart.forEach(item => {
    itemDetails += `• ${item.title} (${item.id}) \n  *Qty:* ${item.quantity} × ₹${item.price} = ₹${item.price * item.quantity}\n\n`;
    orderTotal += (item.price * item.quantity);
  });

  // Clean formatted text string using standard WhatsApp text decoration markdown codes (* for bold)
  const textMessage = 
    `*NEW ORDER PLACEMENT - PAHRIN*\n` +
    `-----------------------------------\n\n` +
    `*Customer Information:*\n` +
    `• *Name:* ${name}\n` +
    `• *Mobile Contact:* ${mobile}\n` +
    `• *Shipping Address:* ${address}\n\n` +
    `*Order Items:*\n` +
    `${itemDetails}` +
    `-----------------------------------\n` +
    `*Total Order Amount:* ₹${orderTotal}\n\n` +
    `Please confirm my order and share estimated arrival timeline. Thank you!`;

  const encryptedMessage = encodeURIComponent(textMessage);
  
  // Launches official web client or local system app instantly addressed directly to you
  const businessPhone = "918087668114"; // Country code + mobile number layout
  window.open(`https://api.whatsapp.com/send?phone=${businessPhone}&text=${encryptedMessage}`, '_blank');

  // Safely wipe form input details and cart data values
  cart = [];
  updateCartUI();
  document.getElementById("checkoutForm").reset();
  document.getElementById("checkoutModal").classList.remove("open");
}

// ──────────────────────────────────────────
// INTERACTION LISTENERS
// ──────────────────────────────────────────
document.getElementById("cartOpenBtn").addEventListener("click", () => document.getElementById("cartDrawer").classList.add("open"));
document.getElementById("cartCloseBtn").addEventListener("click", () => document.getElementById("cartDrawer").classList.remove("open"));

// Checkout Modal Triggers
document.getElementById("checkoutTriggerBtn").addEventListener("click", () => {
  if (cart.length === 0) {
    alert("Your cart is currently empty!");
    return;
  }
  document.getElementById("cartDrawer").classList.remove("open");
  document.getElementById("checkoutModal").classList.add("open");
});
document.getElementById("checkoutCloseBtn").addEventListener("click", () => {
  document.getElementById("checkoutModal").classList.remove("open");
});

document.querySelectorAll(".filter-pill").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-pill").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCategory = btn.dataset.category;
    renderProducts();
  });
});

document.getElementById("sortSelect").addEventListener("change", (e) => {
  sortMode = e.target.value;
  renderProducts();
});

let searchTimer;
document.getElementById("searchInput").addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    renderProducts();
  }, 200);
});

const scrollBtn = document.getElementById("scrollTopBtn");
window.addEventListener("scroll", () => {
  scrollBtn.classList.toggle("visible", window.scrollY > 400);
}, { passive: true });
scrollBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    closeProductModal();
    document.getElementById("cartDrawer").classList.remove("open");
    document.getElementById("checkoutModal").classList.remove("open");
  }
});
</script>
</body>
</html>
